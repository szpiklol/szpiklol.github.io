<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona z Interaktywnym Tłem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* --- RESET I GŁÓWNE STYLE --- */
        :root {
            --bg-dark: #121212;
            --accent-glow: rgba(255, 60, 60, 0.4);
            --accent-solid: #ff3c3c;
            --success-green: #28c940;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: var(--bg-dark);
        }

        #particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg-dark) 100%);
        }

        #content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            pointer-events: auto;
        }

        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; overflow-y: auto; height: 90vh; }
        }

        /* --- GLASSMORPHISM --- */
        .glass-panel {
            background: var(--glass-bg);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px var(--accent-glow);
        }

        /* --- PROFIL --- */
        .profile-part { display: flex; flex-direction: column; gap: 20px; }
        .avatar-panel { text-align: center; }
        .avatar-img {
            width: 120px; height: 120px; border-radius: 50%;
            box-shadow: 0 0 20px 5px var(--accent-glow);
            transition: all 0.3s ease;
        }
        .profile-name { color: white; font-weight: bold; font-size: 1.5rem; margin-top: 10px; }
        .profile-discord { color: #aaa; font-size: 0.9rem; }

        .links-panel { display: flex; flex-direction: column; gap: 10px; }
        .link-button {
            background: var(--glass-bg); border-radius: 10px; padding: 15px 20px;
            text-decoration: none; color: white; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border); transition: 0.2s;
        }
        .link-button:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }

        /* --- TERMINAL --- */
        .terminal-panel { font-family: 'Courier New', monospace; position: relative; min-height: 180px; }
        .terminal-header { display: flex; justify-content: space-between; margin-bottom: 15px; color: #777; font-size: 0.8rem; }
        .terminal-dots { display: flex; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .red { background: #ff5f57; } .yellow { background: #ffbd2e; } .green { background: #28c940; }
        .t-user { color: var(--accent-solid); font-weight: bold; }
        .t-success { color: #00ff00; }
        .t-cmd { color: #fdfdfd; }

        /* --- NOWY PANEL: SKILLS (Animowany Kwadrat) --- */
        .skills-panel {
            margin-top: 20px;
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skill-item {
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #eee;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        /* Stylizacja poziomów */
        .lvl-adv { color: #ff0000; font-weight: bold; } /* Zaawansowany na czerwono */
        .lvl-basic { color: #00ff00; font-weight: bold; } /* Podstawowy na zielono */

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' .'; }
            40% { content: ' ..'; }
            60% { content: ' ...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>

    <div id="particle-bg"></div>

    <div id="content-wrapper">
        <div class="grid-container">

            <div class="profile-part">
                <div class="glass-panel avatar-panel">
                    <div class="avatar-img-wrapper">
                        <img src="https://i.ibb.co/3fd2s58/catexplosion.jpg" alt="Avatar" class="avatar-img">
                    </div>
                    <div class="profile-name">TWOJA NAZWA</div>
                    <div class="profile-discord"><i class="fab fa-discord"></i> dc: szpiklol</div>
                </div>

                <div class="links-panel">
                    <a href="#" class="link-button"><i class="fab fa-github"></i> GitHub <i class="fas fa-external-link-alt"></i></a>
                    <a href="#" class="link-button"><i class="fab fa-bitcoin"></i> Litecoin <i class="fas fa-copy"></i></a>
                </div>
            </div>

            <div class="terminal-part">
                <div class="glass-panel terminal-panel">
                    <div class="terminal-header">
                        <div class="terminal-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="terminal-title">contact_info.sh</div>
                    </div>
                    <div class="terminal-content">
                        <p><span class="t-user">user@host:~$</span> fetch contacts</p>
                        <p><i class="fab fa-discord"></i> Discord: <span class="t-cmd">szpiklol</span></p>
                        <p><i class="fas fa-envelope"></i> Email: <span class="t-cmd">szpiklol@proton.me</span></p>
                        <p><span class="t-success">✓</span> <span class="t-user">System online.</span></p>
                    </div>
                </div>

                <div class="glass-panel skills-panel">
                    <div style="color: #fff; margin-bottom: 15px; border-bottom: 1px solid var(--accent-solid); display: inline-block;">
                        <i class="fas fa-code"></i> SKILLS_LOG
                    </div>
                    <div class="skill-item">Java <span class="lvl-adv">Zaawansowany</span></div>
                    <div class="skill-item">Python (<span class="lvl-basic">Podstawowy</span>)</div>
                    <div class="skill-item">JAVASCRIPT(<span class="lvl-adv">ZAAWANSOWANY</span>)</div>
                    <div class="skill-item">C++(<span class="lvl-basic">podstawowy</span>)</div>
                    <div class="skill-item">HTML(<span class="lvl-adv">ZAAWANSOWANY</span>)</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /* --- CZĄSTECZKI --- */
        const canvasContainer = document.getElementById('particle-bg');
        function createParticle(x = null, y = null) {
            const particle = document.createElement('div');
            const size = Math.random() * 4 + 1;
            const startX = x !== null ? x : Math.random() * window.innerWidth;
            const startY = y !== null ? y : Math.random() * window.innerHeight;
            
            particle.style.cssText = `
                position: absolute; width: ${size}px; height: ${size}px;
                background: ${Math.random() > 0.8 ? '#ff3c3c' : '#ffffff'};
                border-radius: 50%; opacity: ${Math.random() * 0.5};
                left: ${startX}px; top: ${startY}px; pointer-events: none;
                filter: blur(1px); transition: transform 0.1s linear;
            `;
            canvasContainer.appendChild(particle);

            let speedX = (Math.random() - 0.5) * 1;
            let speedY = (Math.random() - 0.5) * 1;

            function animate() {
                if(!particle.isConnected) return;
                let curX = parseFloat(particle.style.left) + speedX;
                let curY = parseFloat(particle.style.top) + speedY;
                if (curX <= 0 || curX >= window.innerWidth) speedX *= -1;
                if (curY <= 0 || curY >= window.innerHeight) speedY *= -1;
                particle.style.left = `${curX}px`;
                particle.style.top = `${curY}px`;
                requestAnimationFrame(animate);
            }
            animate();
            setTimeout(() => { particle.remove(); createParticle(); }, 15000);
        }

        for (let i = 0; i < 40; i++) createParticle();

        /* --- PARALAKSA --- */
        const contentWrapper = document.getElementById('content-wrapper');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            contentWrapper.style.transform = `translateX(${xAxis}px) translateY(${yAxis}px)`;
        });
    </script>
</body>
</html>
